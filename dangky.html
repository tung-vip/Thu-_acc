<!DOCTYPE html>
<html>
<head>
    <title>Đăng Ký Tài Khoản</title>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="padding: 20px; font-family: Arial, sans-serif;">

    <h2>📝 ĐĂNG KÝ TÀI KHOẢN SHOP</h2>
    
    <label>Tên tài khoản (Viết liền không dấu):</label><br>
    <input type="text" id="username" placeholder="Ví dụ: tung123" style="padding: 8px; width: 250px; margin-bottom: 10px;"><br>

    <label>Mật khẩu:</label><br>
    <input type="password" id="password" placeholder="Nhập mật khẩu" style="padding: 8px; width: 250px; margin-bottom: 15px;"><br>

    <button type="button" onclick="xuLyDangKy()" style="padding: 10px 20px; background-color: green; color: white; border: none; cursor: pointer;">Đăng Ký Ngay</button>
    
    <p>Đã có tài khoản? <a href="dangnhap.html">Đăng nhập tại đây</a></p>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDg7_Scc7LfX_VU8XMgi3HZgLnaqJ3pCCc",
            authDomain: "shopaccphutung.firebaseapp.com",
            databaseURL: "https://shopaccphutung-default-rtdb.firebaseio.com/", 
            projectId: "shopaccphutung",
            storageBucket: "shopaccphutung.firebasestorage.app",
            messagingSenderId: "532627354661",
            appId: "1:532627354661:web:fa6c9db6c293aaef6fbbcc",
            measurementId: "G-WEYD2C922V"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function xuLyDangKy() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            if(user == "" || pass == "") {
                alert("Vui lòng điền đầy đủ tài khoản và mật khẩu nha!");
                return;
            }

            database.ref('Users/' + user).set({
                matKhau: pass,
                quyenHan: "user"
            }, function(error) {
                if (error) {
                    alert("Có lỗi xảy ra, đăng ký thất bại: " + error.message);
                } else {
                    alert("Chúc mừng Tùng, tài khoản đã được lưu vào Firebase!");
                    window.location.href = "dangnhap.html";
                }
            });
        }
    </script>
</body>
</html>
